<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    body{
        background-color: blueviolet;
    }
    p{
        font-size:30px;
        color: aquamarine;
    }
    button{
        font-size:30px;
        background-color:cornsilk;
    }
    input{
        font-size:20px;
        color: crimson;
        background-color:antiquewhite;
    }
</style>
<body>
    <p>Enter a number and click OK :</p>

<input id="id" type="number" min="100" max="500" required>

<button onclick="myFunction()">OK</button>

<p>If the number is less than 100 or greater than 500, an error message will
be displayed .</p>

<p id="result"></p>

<script>
    
function myFunction() {
var inpobj = document.getElementById("id");

if (!inpobj. checkValidity()) {
document.getElementById("result"). innerHTML =
inpobj.validationMessage;
} else
document.getElementById("result") . innerHTML = "Input OK";

}
</script>
</body>
</html>
